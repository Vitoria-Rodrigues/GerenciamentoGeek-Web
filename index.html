<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <!-- Font Awesome-->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="logo">
            <img src="./assets/img/LogoGG.png" alt="Logo GG">
        </div>
        <nav class="saida">
            <button>Sair</button>
        </nav>
    </header>
    <main>
        <section class="system-name">
            <span>
                <img src="./assets/img/logoG-1(200).png">
                <p>erenciamento</p>
            </span>
            <span>
                <img src="./assets/img/logoG-2(200).png">
                <p>eek</p>
            </span>
        </section>
        <section class="title-func">
            <h1>Funcionalidades do sistema</h1>
        </section>
        <section class="functionalities">
            <article>
                <button>
                    <span><img src="./assets/img/cliente.svg"></span> 
                    Cadastrar Cliente
                </button>
                <button>
                    <span><img src="./assets/img/produto.svg"></span> 
                    Cadastrar Produto
                </button>
                <button>
                    <span><img src="./assets/img/venda.svg"></span> 
                    Cadastrar Venda
                </button>
            </article>
            <article>
                <button>
                    <span><img src="./assets/img/clientes.svg"></span> 
                    Exibir Clientes
                </button>
                <button>
                    <span><img src="./assets/img/produtos.svg"></span> 
                    Exibir Produtos
                </button>
                <button>
                    <span><img src="./assets/img/vendas.svg"></span> 
                    Exibir Vendas
                </button>
            </article>
        </section>
    </main>
</body>
</html>
